name: Release

# Builds the plugin and publishes a GitHub release whenever a bare semver tag
# (e.g. 1.2.3, no leading "v") is pushed. Building in CI lets us attach a
# cryptographic build-provenance attestation to the release assets, which the
# Obsidian plugin portal recommends.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write # create the release
  id-token: write # required for attestation
  attestations: write # write the provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            main.js manifest.json styles.css \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
